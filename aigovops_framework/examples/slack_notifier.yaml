# Example: Slack notification agent
# Sends a Slack message when an approval is granted
agent:
  name: personal/slack_notifier
  description: "Notifies a Slack channel when approvals are granted"
  trigger: "approval.approved"
  model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 128
  system_prompt: |
    Format this approval notification for Slack. Keep it brief (1-2 lines).
    Include: who approved, what was approved, and the agent that requested it.

actions:
  - when: "true"
    do: call_integration
    params:
      name: "slack"
      method: "send_message"
      channel: "#approvals"
