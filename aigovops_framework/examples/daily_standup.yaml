# Example: Daily standup summary agent
# Generates a standup summary from yesterday's audit log
agent:
  name: personal/daily_standup
  description: "Generates a daily standup summary from agent activity"
  trigger: "schedule.daily_0830"
  model: "gpt-4o-mini"
  temperature: 0.4
  max_tokens: 512
  system_prompt: |
    You are generating a daily standup summary for a small team.
    Summarize what the AI agents accomplished yesterday in 3-5 bullet points.
    Format: "• [Agent] did [action] — [result]"
    Keep it concise and actionable.

actions:
  - when: "true"
    do: send_notification
    params:
      message: "output"
      urgency: "normal"

schedule:
  cron: "30 8 * * 1-5"
  timezone: "America/Los_Angeles"
