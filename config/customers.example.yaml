# ai-bob-setup-agent — Example customer config
# Real customer configs live in config/customers/<slug>.yaml and are gitignored.
# Copy this file and customize per customer.

customer:
  slug: acme-marketing               # used in URLs, workspace names — keep lowercase, hyphenated
  legal_name: "Acme Marketing LLC"
  primary_contact:
    name: "Jane Acme"
    email: "jane@acmemarketing.com"
    phone: "+1-555-0100"
  vertical: marketing                # marketing | law | insurance | manufacturing | wholesale | real_estate
  sub_niche: "B2B SaaS lead-gen agencies in the Pacific Northwest"
  timezone: "America/Los_Angeles"

contract:
  tier: hermes                       # hermes ($10K/mo) | openclaw ($5K/mo)
  start_date: "2026-05-15"
  billing_cycle: monthly
  unlimited:                         # The anti-friction offer (per Nick)
    agents: true
    usage: true
    monitoring: true
    security: true
    ongoing_changes: true

# Agents to provision for this customer.
# Customers think they need many. Most need 1-3.
agents:
  - name: outreach-agent
    runtime: hermes
    role: "Cold outbound + reply triage"
    mcps: [perplexity, context7, x]
    connectors: [composio, agent_mail]
    second_brain:
      enabled: true
      seed_path: "config/second-brain-seeds/marketing.md"

  - name: proposal-agent
    runtime: hermes
    role: "Draft scoped proposals from discovery notes"
    mcps: [perplexity, context7]
    connectors: [composio]
    second_brain:
      enabled: true
      seed_path: "config/second-brain-seeds/marketing.md"

  - name: ops-agent
    runtime: openclaw                # mixed-tier is fine
    role: "Daily reporting + Trello hygiene"
    mcps: [context7]
    connectors: [composio]
    second_brain:
      enabled: false

# Customer-facing surface (what they actually touch)
surface:
  telegram_channel: true             # meta-agent control channel
  weekly_loom_digest: true
  trello_board: true
  granola_meeting_notes: true

# Observability
observability:
  watchdog_interval_seconds: 300
  alert_channels: [email, telegram]
  health_digest_cadence: daily       # daily | weekly
  health_digest_time: "08:00"

# Notes for Bob (not pushed to the agent)
operator_notes: |
  Initial discovery 2026-05-12 with Jane.
  Pain points: BDR turnover, inconsistent reply quality, lead-gen reports
  taking analysts 6+ hours per week. Wants outreach automated by end of month.
  Decision-maker: Jane (CMO). Champion: Marcus (ops manager).
