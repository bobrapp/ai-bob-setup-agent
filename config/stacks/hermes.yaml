# Hermes stack definition — the $10K/mo tier
# Loaded by src/hermes_install.py during agent provisioning.

stack: hermes
display_name: "Hermes Premium Agent"
monthly_price_usd: 10000

runtime:
  name: hermes
  version: "${HERMES_RUNTIME_VERSION:-latest}"
  install_method: orgo_image          # uses Orgo's Hermes base image
  base_image: "orgo/hermes:latest"

models:
  primary:
    provider: openai
    model: gpt-5.5
    reason: "Recommended default for Hermes tool-calling (per Nick)."
  fallback:
    provider: anthropic
    model: opus-4.7
    reason: "Long-horizon coding tasks and complex multi-step reasoning."
  light:
    provider: zai
    model: glm-5.1
    reason: "Cheap workhorse for high-volume routine calls."

mcps:
  - name: perplexity
    purpose: "Live web search — fresh facts the model wasn't trained on"
    required: true
  - name: context7
    purpose: "Live docs — up-to-date setup context for tools and APIs"
    required: true
  - name: x_mcp
    purpose: "Live social signals — X/Twitter posts and trends"
    required: false
  - name: orgo
    purpose: "Agent self-management — lets agents manage their own Orgo cloud computers"
    required: false

connectors:
  - name: composio
    purpose: "App-action connectors (Trello, Asana, Notion, etc.)"
    required: true
  - name: agent_mail
    purpose: "Email infrastructure — sending and receiving on agent identities"
    required: true

composio_apps:
  available:
    - gmail
    - google_calendar
    - notion
    - trello
    - asana
    - superhuman
    - granola
    - slack
    - hubspot
    - salesforce
  note: "Apps connected via Composio. Specify per-agent in customer YAML."

second_brain:
  enabled: true
  layer: obsidian
  reason: "Per-customer durable memory. Required for Hermes tier."

observability:
  watchdog: true
  heartbeat_seconds: 60
  email_digest: daily
  telegram_alerts: true

resources:
  cpu_vcpus: 4
  memory_gb: 8
  disk_gb: 80
  network_egress_gb: 200
