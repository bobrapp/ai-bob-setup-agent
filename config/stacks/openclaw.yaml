# OpenClaw stack definition — the $5K/mo tier
# Loaded by src/hermes_install.py (handles both runtimes) during provisioning.

stack: openclaw
display_name: "OpenClaw Standard Agent"
monthly_price_usd: 5000

runtime:
  name: openclaw
  version: "latest"
  install_method: orgo_image
  base_image: "orgo/openclaw:latest"

models:
  primary:
    provider: openai
    model: gpt-5.5
    reason: "Same default as Hermes. OpenAI's paid plan is generous enough for tool calling at this tier."
  light:
    provider: zai
    model: glm-5.1
    reason: "Top open-source pick for cheap light tasks (per Nick)."
  light_fallback:
    provider: kimi
    model: kimmy
    reason: "Close runner-up to GLM 5.1 for cheap workloads."

mcps:
  - name: perplexity
    purpose: "Live web search"
    required: true
  - name: context7
    purpose: "Live docs"
    required: false
  - name: orgo
    purpose: "Agent self-management — lets agents manage their own Orgo cloud computers"
    required: false

connectors:
  - name: composio
    purpose: "App-action connectors"
    required: true
  - name: agent_mail
    purpose: "Email infrastructure"
    required: false

composio_apps:
  available:
    - gmail
    - google_calendar
    - notion
    - trello
    - asana
    - superhuman
    - granola
    - slack
    - hubspot
    - salesforce
  note: "Apps connected via Composio. Specify per-agent in customer YAML."

second_brain:
  enabled: false
  reason: "OpenClaw tier ships without per-customer second brain by default. Upgrade to Hermes for that."

observability:
  watchdog: true
  heartbeat_seconds: 120
  email_digest: daily
  telegram_alerts: true

resources:
  cpu_vcpus: 2
  memory_gb: 4
  disk_gb: 40
  network_egress_gb: 100
