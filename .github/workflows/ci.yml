name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fix script permissions
        run: |
          chmod +x deploy/*.sh scripts/*.py install.sh

      - name: Ruff lint
        run: |
          ruff check src tests scripts

      - name: Ruff format check
        run: |
          ruff format --check src tests scripts

      - name: Smoke tests
        run: |
          pytest tests -v

      - name: Dry-run install
        run: |
          bash ./install.sh --dry-run

      - name: Dry-run onboard
        run: |
          mkdir -p config/customers
          cp config/customers.example.yaml config/customers/acme-marketing.yaml
          python -m src.setup_agent onboard --customer acme-marketing --dry-run=true
        env:
          ORGO_API_KEY: dummy
          OPENAI_API_KEY: dummy
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CONTROL_CHAT_ID: dummy
